[tools]
python = "3.12"
uv = "0.9.26"

[env]
UV_PROJECT_ENVIRONMENT = ".venv"

[tasks.sync]
description = "Create or update the local virtual environment"
run = "uv sync"

[tasks.console]
description = "Run the agent locally with console audio I/O"
depends = ["sync"]
run = "uv run python main.py console"

[tasks.dev]
description = "Run the agent against a LiveKit deployment"
depends = ["sync"]
run = "uv run python main.py dev"

[tasks.download-files]
description = "Download local LiveKit turn-detector assets"
depends = ["sync"]
run = "uv run python main.py download-files"

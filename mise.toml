[tools]
python = "3.12"
uv = "0.9.26"

[env]
UV_PROJECT_ENVIRONMENT = ".venv"

[tasks.sync]
description = "Create or update the local virtual environment"
run = "uv sync"

[tasks.console]
description = "Run the agent locally with console audio I/O"
depends = ["sync"]
run = "uv run python main.py console"

[tasks.dev]
description = "Run the agent against a LiveKit deployment"
depends = ["sync"]
run = "uv run python main.py dev"

[tasks.smoke-text]
description = "Run text-only smoke tests against the web research agent"
depends = ["sync"]
run = "uv run python scripts/text_smoke.py"

[tasks.verify-prefactor]
description = "Run a text smoke test and fail if Prefactor spans are missing"
depends = ["sync"]
run = "uv run python scripts/text_smoke.py --verify-prefactor"
